<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>3D Math Visualizer — SymbolWriter</title>
<style>
  :root {
    --bg: #0e0b1d;
    --surf: #16122a;
    --surf2: #1e1a30;
    --border: #2e2a45;
    --fg: #e2e0f0;
    --muted: #888;
    --accent: #a78bfa;
    --accent2: #34d399;
    --danger: #f87171;
    --btn: #1e1a30;
    --btn-h: #2a2545;
    --info-bg: rgba(167,139,250,0.12);
    --info-col: #a78bfa;
    --info-border: rgba(167,139,250,0.3);
  }
  body.light {
    --bg: #f4f3fa;
    --surf: #ffffff;
    --surf2: #f0eeff;
    --border: #d0cce8;
    --fg: #1a1730;
    --muted: #666;
    --btn: #ece9ff;
    --btn-h: #dbd6ff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--fg);
    font-family: 'Inter', 'Segoe UI', sans-serif;
    font-size: 13px;
    min-height: 100vh;
  }

  /* ── Header ── */
  .hdr {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    background: var(--surf);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
    flex-wrap: wrap;
    gap: 8px;
  }
  .logo { font-size: 15px; font-weight: 700; color: var(--accent); letter-spacing: -0.5px; }
  .logo span { color: var(--fg); }
  .hdr-actions { display: flex; gap: 6px; flex-wrap: wrap; }
  .hbtn {
    padding: 5px 10px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--btn);
    color: var(--fg);
    cursor: pointer;
    font-size: 11px;
    transition: all 0.15s;
  }
  .hbtn:hover { background: var(--btn-h); border-color: var(--accent); }
  .hbtn.lit { background: var(--info-bg); border-color: var(--info-border); color: var(--accent); }

  /* ── Main ── */
  .main { padding: 14px 16px; max-width: 1200px; margin: 0 auto; }

  /* ── Tabs ── */
  .tab-bar {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 12px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 10px;
  }
  .tab-btn {
    padding: 6px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .tab-btn.active {
    background: var(--info-bg);
    color: var(--accent);
    border-color: var(--info-border);
  }

  /* ── Controls ── */
  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: flex-end;
    margin-bottom: 12px;
    padding: 12px;
    background: var(--surf);
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  .ctrl-group { display: flex; flex-direction: column; gap: 4px; }
  .ctrl-label { font-size: 11px; color: var(--muted); }
  .ctrl-input {
    padding: 6px 10px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surf2);
    color: var(--fg);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    outline: none;
  }
  .ctrl-input:focus { border-color: var(--accent); }
  .draw-btn {
    padding: 7px 18px;
    border-radius: 6px;
    border: 1px solid var(--info-border);
    background: var(--info-bg);
    color: var(--accent);
    cursor: pointer;
    font-size: 12px;
    font-weight: 600;
    transition: all 0.15s;
  }
  .draw-btn:hover { background: var(--accent); color: #fff; }

  /* ── Multi-function section ── */
  .multi-fn-wrap {
    background: var(--surf2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    margin-bottom: 10px;
  }
  .multi-fn-hdr {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .fn-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
  }
  .fn-color { width: 28px; height: 28px; border-radius: 4px; border: 1px solid var(--border); cursor: pointer; padding: 0; }
  .fn-input { flex: 1; }
  .fn-del { background: none; border: none; color: var(--danger); cursor: pointer; font-size: 16px; padding: 0 4px; }

  /* ── Animation ── */
  .anim-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 12px;
    background: var(--surf);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 10px;
    flex-wrap: wrap;
  }
  .anim-label { font-size: 11px; color: var(--muted); }
  .anim-t { font-family: monospace; color: var(--accent); font-size: 12px; min-width: 40px; }

  /* ── Plot ── */
  .plot-wrap {
    position: relative;
    width: 100%;
    height: 480px;
    border-radius: 10px;
    border: 1px solid var(--border);
    overflow: hidden;
    background: var(--surf);
    touch-action: none;
  }
  #plot { width: 100%; height: 100%; }

  /* ── Tooltip ── */
  #pt-tooltip {
    position: absolute;
    top: 10px;
    right: 10px;
    background: rgba(14,11,29,0.92);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    pointer-events: none;
    display: none;
    backdrop-filter: blur(8px);
    z-index: 50;
    line-height: 1.8;
  }

  /* ── Export bar ── */
  .export-bar {
    display: flex;
    gap: 8px;
    margin-top: 10px;
    flex-wrap: wrap;
    align-items: center;
  }
  .export-label { font-size: 11px; color: var(--muted); }

  /* ── Presets ── */
  .presets { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
  .preset-btn {
    padding: 4px 12px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--btn);
    color: var(--muted);
    font-size: 11px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .preset-btn:hover { background: var(--btn-h); color: var(--fg); border-color: var(--accent); }

  /* ── Error ── */
  .error-msg {
    display: none;
    padding: 8px 12px;
    border-radius: 6px;
    background: rgba(248,113,113,0.15);
    color: var(--danger);
    font-size: 12px;
    margin-bottom: 8px;
    border: 1px solid rgba(248,113,113,0.3);
  }

  /* ── Result ── */
  .result-label {
    font-size: 12px;
    color: var(--accent2);
    padding: 4px 10px;
    background: rgba(52,211,153,0.1);
    border-radius: 6px;
    border: 1px solid rgba(52,211,153,0.2);
  }

  /* ── Color scheme picker ── */
  .scheme-wrap { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
  .scheme-btn {
    width: 24px; height: 24px; border-radius: 4px; border: 2px solid transparent;
    cursor: pointer; transition: all 0.15s;
  }
  .scheme-btn.active { border-color: var(--accent); transform: scale(1.15); }

  /* ── Mobile ── */
  @media (max-width: 600px) {
    .main { padding: 8px; }
    .plot-wrap { height: 340px; }
    .controls { gap: 8px; padding: 8px; }
    .ctrl-input { font-size: 11px; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<div class="hdr">
  <div class="logo">∿ 3D Math <span>Visualizer</span></div>
  <div class="hdr-actions">
    <button class="hbtn" onclick="window.close()">← Back to SymbolWriter</button>
    <button class="hbtn" id="themeBtn" onclick="toggleTheme()">☀ Light</button>
    <button class="hbtn lit" onclick="exportPNG()">↓ PNG</button>
    <button class="hbtn lit" onclick="exportSVG()">↓ SVG</button>
    <button class="hbtn lit" onclick="exportCSV()">↓ CSV</button>
  </div>
</div>

<div class="main">
  <!-- TABS -->
  <div class="tab-bar">
    <button class="tab-btn active" id="tab-surface" onclick="switchTab('surface')">Surface z=f(x,y)</button>
    <button class="tab-btn" id="tab-volume" onclick="switchTab('volume')">Volume (∫∫)</button>
    <button class="tab-btn" id="tab-area" onclick="switchTab('area')">Area under curve</button>
    <button class="tab-btn" id="tab-contour" onclick="switchTab('contour')">Contour map</button>
  </div>

  <!-- MULTI-FUNCTION (Surface & Area tabs) -->
  <div class="multi-fn-wrap" id="multi-fn-section">
    <div class="multi-fn-hdr">
      <span>📈 Multiple Functions</span>
      <button class="hbtn" onclick="addFnRow()">+ Add Function</button>
    </div>
    <div id="fn-rows"></div>
  </div>

  <!-- ANIMATION BAR -->
  <div class="anim-bar" id="anim-bar">
    <span class="anim-label">🎬 Animation (t parameter)</span>
    <button class="hbtn" id="anim-btn" onclick="toggleAnim()">▶ Play</button>
    <input type="range" id="anim-slider" min="0" max="628" value="0" step="2" style="width:120px" oninput="onSliderChange(this.value)">
    <span class="anim-t" id="anim-t-val">t = 0.00</span>
    <span class="anim-label">Speed:</span>
    <select class="ctrl-input" id="anim-speed" style="width:70px">
      <option value="0.03">Slow</option>
      <option value="0.06" selected>Normal</option>
      <option value="0.12">Fast</option>
    </select>
    <span class="anim-label" style="color:var(--accent);font-size:10px">Use 't' in expression: sin(x + t)</span>
  </div>

  <!-- COLOR SCHEMES -->
  <div class="controls" style="gap:12px; margin-bottom:10px; padding:8px 12px;">
    <span style="font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:1px;">Color Scheme:</span>
    <div class="scheme-wrap" id="scheme-wrap"></div>
    <div class="ctrl-group" style="margin-left:auto">
      <span class="ctrl-label">Custom Color</span>
      <input type="color" id="custom-color" value="#a78bfa" class="fn-color" style="width:50px; height:28px;" onchange="applyCustomColor(this.value)">
    </div>
  </div>

  <!-- SURFACE CONTROLS -->
  <div class="controls" id="controls-surface">
    <div class="ctrl-group">
      <span class="ctrl-label">x,y range ±</span>
      <input class="ctrl-input" id="range-surface" type="number" value="5" min="1" max="20" style="width:64px">
    </div>
    <div class="ctrl-group">
      <span class="ctrl-label">Resolution</span>
      <input class="ctrl-input" id="res-surface" type="range" min="15" max="60" value="35" step="5" style="width:80px; padding:10px 0;">
    </div>
    <div class="ctrl-group">
      <span class="ctrl-label">Opacity</span>
      <input class="ctrl-input" id="opacity-surface" type="range" min="0.3" max="1" value="0.92" step="0.05" style="width:80px; padding:10px 0;">
    </div>
    <button class="draw-btn" onclick="drawSurface()">Draw ↗</button>
  </div>

  <!-- VOLUME CONTROLS -->
  <div class="controls" id="controls-volume" style="display:none">
    <div class="ctrl-group">
      <span class="ctrl-label">Top surface z = f(x,y)</span>
      <input class="ctrl-input" id="fn-vol-top" value="4 - x^2 - y^2" style="width:180px">
    </div>
    <div class="ctrl-group">
      <span class="ctrl-label">Bottom z =</span>
      <input class="ctrl-input" id="fn-vol-bot" value="0" style="width:80px">
    </div>
    <div class="ctrl-group">
      <span class="ctrl-label">x,y range ±</span>
      <input class="ctrl-input" id="range-vol" type="number" value="2" min="1" max="10" style="width:56px">
    </div>
    <button class="draw-btn" onclick="drawVolume()">Draw ↗</button>
    <span class="result-label" id="vol-result"></span>
  </div>

  <!-- AREA CONTROLS -->
  <div class="controls" id="controls-area" style="display:none">
    <div class="ctrl-group">
      <span class="ctrl-label">from x =</span>
      <input class="ctrl-input" id="area-a" type="number" value="0" style="width:56px">
    </div>
    <div class="ctrl-group">
      <span class="ctrl-label">to x =</span>
      <input class="ctrl-input" id="area-b" type="number" value="3" style="width:56px">
    </div>
    <button class="draw-btn" onclick="drawArea()">Draw ↗</button>
    <span class="result-label" id="area-result"></span>
  </div>

  <!-- CONTOUR CONTROLS -->
  <div class="controls" id="controls-contour" style="display:none">
    <div class="ctrl-group">
      <span class="ctrl-label">z = f(x, y)</span>
      <input class="ctrl-input" id="fn-contour" value="x^2 - y^2" style="width:200px">
    </div>
    <div class="ctrl-group">
      <span class="ctrl-label">x,y range ±</span>
      <input class="ctrl-input" id="range-contour" type="number" value="4" min="1" max="15" style="width:56px">
    </div>
    <button class="draw-btn" onclick="drawContour()">Draw ↗</button>
  </div>

  <!-- ERROR -->
  <div class="error-msg" id="error-msg"></div>

  <!-- PLOT -->
  <div class="plot-wrap">
    <div id="plot"></div>
    <div id="pt-tooltip"></div>
  </div>

  <!-- EXPORT BAR -->
  <div class="export-bar">
    <span class="export-label">Export:</span>
    <button class="hbtn lit" onclick="exportPNG()">📷 PNG</button>
    <button class="hbtn lit" onclick="exportSVG()">🖼 SVG</button>
    <button class="hbtn lit" onclick="exportCSV()">📄 CSV</button>
    <button class="hbtn" onclick="clearPlot()">✕ Clear</button>
  </div>

  <!-- PRESETS -->
  <div class="presets" id="presets"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/12.4.0/math.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/plotly.js/2.27.0/plotly.min.js"></script>
<script>
// ── THEME ──
let dark = true;
function toggleTheme() {
  dark = !dark;
  document.body.classList.toggle('light', !dark);
  document.getElementById('themeBtn').textContent = dark ? '☀ Light' : '🌙 Dark';
  redraw();
}

const getColors = () => ({
  plotBg: dark ? '#0e0b1d' : '#ffffff',
  gridCol: dark ? 'rgba(255,255,255,0.08)' : 'rgba(0,0,0,0.08)',
  textCol: dark ? '#c8c8d0' : '#444'
});

// ── COLOR SCHEMES ──
const SCHEMES = [
  { name: 'Viridis', value: 'Viridis', preview: 'linear-gradient(90deg,#440154,#31688e,#35b779,#fde725)' },
  { name: 'Plasma',  value: 'Plasma',  preview: 'linear-gradient(90deg,#0d0887,#cc4778,#f0f921)' },
  { name: 'Hot',     value: 'Hot',     preview: 'linear-gradient(90deg,#000,#f00,#ff0,#fff)' },
  { name: 'Blues',   value: 'Blues',   preview: 'linear-gradient(90deg,#f7fbff,#6baed6,#08306b)' },
  { name: 'Rainbow', value: 'Rainbow', preview: 'linear-gradient(90deg,#f00,#ff0,#0f0,#0ff,#00f,#f0f)' },
  { name: 'Earth',   value: 'Earth',   preview: 'linear-gradient(90deg,#155222,#8b6914,#c8a45a,#e8d5b0)' },
];
let activeScheme = 'Viridis';
let customColor = null;

function buildSchemeBar() {
  const wrap = document.getElementById('scheme-wrap');
  wrap.innerHTML = '';
  SCHEMES.forEach(s => {
    const btn = document.createElement('div');
    btn.className = 'scheme-btn' + (s.value === activeScheme ? ' active' : '');
    btn.style.background = s.preview;
    btn.title = s.name;
    btn.onclick = () => { activeScheme = s.value; customColor = null; buildSchemeBar(); redraw(); };
    wrap.appendChild(btn);
  });
}

function applyCustomColor(val) {
  customColor = val;
  activeScheme = null;
  buildSchemeBar();
  redraw();
}

// ── MULTI-FUNCTION ROWS ──
const FN_COLORS = ['#a78bfa','#34d399','#f87171','#60a5fa','#fbbf24','#f472b6','#38bdf8','#4ade80'];
let fnRows = [];
let fnIdCounter = 0;

function addFnRow(defaultExpr = '') {
  const id = fnIdCounter++;
  const color = FN_COLORS[fnRows.length % FN_COLORS.length];
  fnRows.push({ id, expr: defaultExpr, color });
  renderFnRows();
}

function removeFnRow(id) {
  fnRows = fnRows.filter(r => r.id !== id);
  renderFnRows();
}

function renderFnRows() {
  const container = document.getElementById('fn-rows');
  container.innerHTML = '';
  fnRows.forEach(row => {
    const div = document.createElement('div');
    div.className = 'fn-row';
    div.innerHTML = `
      <input type="color" class="fn-color" value="${row.color}" onchange="updateFnColor(${row.id}, this.value)">
      <input class="ctrl-input fn-input" placeholder="e.g. sin(x)*cos(y) or x^2+t" value="${row.expr}"
        oninput="updateFnExpr(${row.id}, this.value)" id="fn-expr-${row.id}">
      <button class="fn-del" onclick="removeFnRow(${row.id})" title="Remove">×</button>`;
    container.appendChild(div);
  });
}

function updateFnColor(id, val) { const r = fnRows.find(r => r.id === id); if (r) r.color = val; }
function updateFnExpr(id, val) { const r = fnRows.find(r => r.id === id); if (r) r.expr = val; }

// ── ANIMATION ──
let animRunning = false;
let animT = 0;
let animFrame = null;

function toggleAnim() {
  animRunning = !animRunning;
  document.getElementById('anim-btn').textContent = animRunning ? '⏸ Pause' : '▶ Play';
  if (animRunning) animStep();
}

function onSliderChange(val) {
  animT = val / 100;
  document.getElementById('anim-t-val').textContent = 't = ' + animT.toFixed(2);
  redraw();
}

function animStep() {
  if (!animRunning) return;
  const speed = parseFloat(document.getElementById('anim-speed').value);
  animT += speed;
  if (animT > 6.28) animT = 0;
  document.getElementById('anim-slider').value = animT * 100;
  document.getElementById('anim-t-val').textContent = 't = ' + animT.toFixed(2);

  // Data only — camera touch නොකිරීම (WARN fix)
  try {
    const plotDiv = document.getElementById('plot');
    if (plotDiv && plotDiv.data && plotDiv.data.length > 0 && currentTab === 'surface') {
      const R = parseFloat(document.getElementById('range-surface').value) || 5;
      const N = parseInt(document.getElementById('res-surface').value) || 35;
      const xs = linspace(-R, R, N);
      const ys = linspace(-R, R, N);
      const zArr = fnRows.filter(r => r.expr.trim()).map(row =>
        ys.map(y => xs.map(x => { const v = evalFn(row.expr, {x,y}); return isNaN(v)?null:v; }))
      );
      if (zArr.length) Plotly.restyle('plot', { z: zArr }, zArr.map((_,i)=>i));
    } else {
      redraw();
    }
  } catch(e) { redraw(); }

  animFrame = requestAnimationFrame(animStep);
}

// ── HELPERS ──
function linspace(a, b, n) {
  const arr = [];
  for (let i = 0; i < n; i++) arr.push(a + (b - a) * i / (n - 1));
  return arr;
}

function evalFn(expr, scope) {
  try { return math.evaluate(expr, { ...scope, t: animT }); }
  catch { return NaN; }
}

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg; el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 4000);
}

// ── CURRENT TAB ──
let currentTab = 'surface';
let lastData = null;
let lastLayout = null;

function switchTab(tab) {
  currentTab = tab;
  ['surface','volume','area','contour'].forEach(t => {
    document.getElementById('controls-' + t).style.display = (t === tab) ? 'flex' : 'none';
    document.getElementById('tab-' + t).classList.toggle('active', t === tab);
  });
  // Multi-fn only for surface & area
  document.getElementById('multi-fn-section').style.display = (tab === 'surface' || tab === 'area') ? 'block' : 'none';
  document.getElementById('anim-bar').style.display = (tab === 'surface' || tab === 'area') ? 'flex' : 'none';
  updatePresets(tab);
  redraw();
}

function redraw() {
  const actions = { surface: drawSurface, volume: drawVolume, area: drawArea, contour: drawContour };
  actions[currentTab]();
}

// ── DRAW SURFACE ──
function drawSurface() {
  const R = parseFloat(document.getElementById('range-surface').value) || 5;
  const N = parseInt(document.getElementById('res-surface').value) || 35;
  const opacity = parseFloat(document.getElementById('opacity-surface').value) || 0.92;
  const xs = linspace(-R, R, N);
  const ys = linspace(-R, R, N);
  const { plotBg, gridCol, textCol } = getColors();
  const data = [];

  // Primary row functions
  fnRows.forEach((row, idx) => {
    if (!row.expr.trim()) return;
    const z = ys.map(y => xs.map(x => { const v = evalFn(row.expr, {x, y}); return isNaN(v) ? null : v; }));
    // Custom color scheme: single function = scheme, multi = per-row color
    let cs;
    if (customColor) {
      cs = [[0, customColor + '55'], [1, customColor]];
    } else if (fnRows.filter(r=>r.expr.trim()).length === 1) {
      cs = activeScheme || 'Viridis';
    } else {
      cs = [[0, row.color + '66'], [1, row.color]];
    }
    data.push({
      type: 'surface', x: xs, y: ys, z,
      colorscale: cs,
      opacity,
      showscale: idx === 0,
      name: `f${idx+1}(x,y) = ${row.expr}`,
      hovertemplate: `f${idx+1}: x=%{x:.2f} y=%{y:.2f} z=%{z:.3f}<extra>${row.expr}</extra>`
    });
  });

  if (!data.length) {
    showError('Add at least one function above');
    return;
  }

  // Preserve user camera if already rotated
  const existingCam = document.getElementById('plot')?._fullLayout?.scene?.camera;
  const camera = existingCam || { eye: {x:1.5, y:1.5, z:1.2} };

  const layout = {
    paper_bgcolor: plotBg, plot_bgcolor: plotBg,
    margin: {l:0, r:0, t:10, b:10},
    font: { color: textCol, size: 12 },
    scene: {
      xaxis: { gridcolor: gridCol, zerolinecolor: gridCol, backgroundcolor: plotBg, title: 'x' },
      yaxis: { gridcolor: gridCol, zerolinecolor: gridCol, backgroundcolor: plotBg, title: 'y' },
      zaxis: { gridcolor: gridCol, zerolinecolor: gridCol, backgroundcolor: plotBg, title: 'z' },
      bgcolor: plotBg,
      camera: camera
    },
    showlegend: fnRows.length > 1,
    legend: { font: { color: textCol, size: 11 }, bgcolor: plotBg }
  };

  lastData = data; lastLayout = layout;
  Plotly.react('plot', data, layout, { displayModeBar: true, responsive: true, scrollZoom: true, modeBarButtonsToRemove: ['toImage','sendDataToCloud'], displaylogo: false });
  setupTooltip();
}

// ── DRAW VOLUME ──
function drawVolume() {
  document.getElementById('multi-fn-section').style.display = 'none';
  document.getElementById('anim-bar').style.display = 'none';
  const exprTop = document.getElementById('fn-vol-top').value;
  const exprBot = document.getElementById('fn-vol-bot').value;
  const R = parseFloat(document.getElementById('range-vol').value) || 2;
  const N = 30;
  const xs = linspace(-R, R, N);
  const ys = linspace(-R, R, N);
  const { plotBg, gridCol, textCol } = getColors();

  let vol = 0;
  const dx = (2*R)/(N-1), dy = (2*R)/(N-1);
  const zTop = [], zBot = [];

  ys.forEach(y => {
    const rowT = [], rowB = [];
    xs.forEach(x => {
      const vt = evalFn(exprTop, {x, y});
      const vb = evalFn(exprBot, {x, y});
      rowT.push(isNaN(vt) ? null : vt);
      rowB.push(isNaN(vb) ? null : vb);
      if (!isNaN(vt) && !isNaN(vb) && vt >= vb) vol += Math.max(0, vt - vb) * dx * dy;
    });
    zTop.push(rowT); zBot.push(rowB);
  });

  document.getElementById('vol-result').textContent = `≈ Volume: ${vol.toFixed(4)} units³`;

  const data = [
    { type:'surface', x:xs, y:ys, z:zTop, colorscale:'Blues', opacity:0.75, name:'top',
      hovertemplate:'top z=%{z:.3f}<extra>top</extra>' },
    { type:'surface', x:xs, y:ys, z:zBot, colorscale:'Reds', opacity:0.5, name:'bottom',
      hovertemplate:'bot z=%{z:.3f}<extra>bottom</extra>' },
  ];

  const layout = {
    paper_bgcolor: plotBg, plot_bgcolor: plotBg,
    margin: {l:0,r:0,t:10,b:10},
    font: {color: textCol, size:12},
    scene: {
      xaxis:{gridcolor:gridCol,zerolinecolor:gridCol,backgroundcolor:plotBg,title:'x'},
      yaxis:{gridcolor:gridCol,zerolinecolor:gridCol,backgroundcolor:plotBg,title:'y'},
      zaxis:{gridcolor:gridCol,zerolinecolor:gridCol,backgroundcolor:plotBg,title:'z'},
      bgcolor:plotBg, aspectmode:'cube'
    }, showlegend:false
  };

  lastData = data; lastLayout = layout;
  Plotly.react('plot', data, layout, { displayModeBar: true, responsive: true, scrollZoom: true, modeBarButtonsToRemove: ['toImage','sendDataToCloud'], displaylogo: false });
}

// ── DRAW AREA ──
function drawArea() {
  const a = parseFloat(document.getElementById('area-a').value);
  const b = parseFloat(document.getElementById('area-b').value);
  if (isNaN(a) || isNaN(b) || a >= b) { showError('Invalid bounds'); return; }
  const { plotBg, gridCol, textCol } = getColors();
  const N = 200;
  const xs = linspace(a, b, N);
  const extX = linspace(a - Math.abs(b-a)*0.3, b + Math.abs(b-a)*0.3, 150);

  const traces = [];
  const resultParts = [];

  fnRows.forEach((row, idx) => {
    if (!row.expr.trim()) return;
    const ys = xs.map(x => { const v = evalFn(row.expr, {x}); return isNaN(v) ? null : v; });
    const extY = extX.map(x => { const v = evalFn(row.expr, {x}); return isNaN(v) ? null : v; });
    let area = 0;
    const dx2 = (b - a) / (N - 1);
    ys.forEach(y => { if (y !== null) area += Math.abs(y) * dx2; });
    resultParts.push(`f${idx+1} ≈ ${area.toFixed(3)}`);

    traces.push({ x: extX, y: extY, mode:'lines', line:{color:row.color, width:2.5}, name:`f${idx+1} = ${row.expr}`, hovertemplate:'x=%{x:.3f}<br>y=%{y:.3f}<extra></extra>' });
    traces.push({ x:[a,...xs,b], y:[0,...ys,0], fill:'tozeroy', fillcolor:row.color+'33', line:{color:'transparent'}, mode:'lines', name:`area${idx+1}`, hoverinfo:'skip', showlegend:false });
  });

  if (!traces.length) { showError('Add at least one function'); return; }
  document.getElementById('area-result').textContent = resultParts.join(' | ');

  const layout = {
    paper_bgcolor:plotBg, plot_bgcolor:plotBg,
    margin:{l:40,r:20,t:20,b:40},
    font:{color:textCol,size:12},
    xaxis:{gridcolor:gridCol,zerolinecolor:gridCol,title:'x',color:textCol},
    yaxis:{gridcolor:gridCol,zerolinecolor:gridCol,title:'y',color:textCol},
    showlegend: fnRows.length > 1,
    legend:{font:{color:textCol,size:11},bgcolor:plotBg}
  };

  lastData = traces; lastLayout = layout;
  Plotly.react('plot', traces, layout, { displayModeBar: true, responsive: true, scrollZoom: true, modeBarButtonsToRemove: ['toImage','sendDataToCloud'], displaylogo: false });
  setupTooltip();
}

// ── DRAW CONTOUR ──
function drawContour() {
  const expr = document.getElementById('fn-contour').value;
  const R = parseFloat(document.getElementById('range-contour').value) || 4;
  const N = 60;
  const xs = linspace(-R, R, N);
  const ys = linspace(-R, R, N);
  const { plotBg, gridCol, textCol } = getColors();
  const z = ys.map(y => xs.map(x => { const v = evalFn(expr, {x,y}); return isNaN(v) ? null : v; }));
  const colorscale = customColor ? [[0,'#000'],[1,customColor]] : (activeScheme || 'Viridis');

  const data = [
    { type:'contour', x:xs, y:ys, z, colorscale,
      contours:{coloring:'heatmap', showlabels:true, labelfont:{size:10,color:'white'}},
      hovertemplate:'x=%{x:.2f}<br>y=%{y:.2f}<br>z=%{z:.3f}<extra></extra>' },
    { type:'contour', x:xs, y:ys, z, colorscale:'Greys', opacity:0.4,
      contours:{coloring:'lines'}, showscale:false, hoverinfo:'skip' },
  ];

  const layout = {
    paper_bgcolor:plotBg, plot_bgcolor:plotBg,
    margin:{l:40,r:20,t:20,b:40},
    font:{color:textCol,size:12},
    xaxis:{gridcolor:gridCol,zerolinecolor:gridCol,title:'x',color:textCol},
    yaxis:{gridcolor:gridCol,zerolinecolor:gridCol,title:'y',color:textCol,scaleanchor:'x'},
  };

  lastData = data; lastLayout = layout;
  Plotly.react('plot', data, layout, {displayModeBar:false,responsive:true});
  setupTooltip();
}

// ── TOOLTIP (Point Tracing) ──
function setupTooltip() {
  const plotDiv = document.getElementById('plot');
  const tooltip = document.getElementById('pt-tooltip');

  plotDiv.on('plotly_hover', function(data) {
    const pt = data.points[0];
    if (!pt) return;
    let html = '';
    if (pt.x !== undefined) html += `x = ${(+pt.x).toFixed(4)}<br>`;
    if (pt.y !== undefined) html += `y = ${(+pt.y).toFixed(4)}<br>`;
    if (pt.z !== undefined) html += `z = ${(+pt.z).toFixed(4)}<br>`;
    if (pt.data?.name) html += `<span style="color:var(--muted);font-size:10px">${pt.data.name}</span>`;
    tooltip.innerHTML = html;
    tooltip.style.display = 'block';
  });

  plotDiv.on('plotly_unhover', function() {
    tooltip.style.display = 'none';
  });
}

// ── EXPORT ──
function exportPNG() {
  Plotly.downloadImage('plot', { format: 'png', width: 1200, height: 800, filename: 'symbolwriter-3d' });
}
function exportSVG() {
  Plotly.downloadImage('plot', { format: 'svg', width: 1200, height: 800, filename: 'symbolwriter-3d' });
}
function exportCSV() {
  if (!lastData || !lastData[0]) return;
  const pt = lastData[0];
  let csv = 'x,y,z\n';
  if (pt.x && pt.y && pt.z) {
    pt.x.forEach((x, i) => {
      const row = pt.z[i];
      if (Array.isArray(row)) {
        pt.y.forEach((y, j) => {
          csv += `${x},${y},${row[j] ?? ''}\n`;
        });
      } else {
        csv += `${x},${pt.y[i] ?? ''},${pt.z[i] ?? ''}\n`;
      }
    });
  }
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv], {type:'text/csv'}));
  a.download = 'symbolwriter-3d.csv';
  a.click();
}

function clearPlot() {
  Plotly.purge('plot');
  lastData = null; lastLayout = null;
}

// ── PRESETS ──
const PRESETS = {
  surface: [
    {label:'sin ripple',  expr:'sin(sqrt(x^2+y^2))', r:6},
    {label:'paraboloid',  expr:'x^2 + y^2', r:3},
    {label:'saddle',      expr:'x^2 - y^2', r:3},
    {label:'wave',        expr:'sin(x)*cos(y)', r:4},
    {label:'animation 🎬',expr:'sin(x + t)*cos(y)', r:4},
  ],
  volume: [
    {label:'paraboloid cap', top:'4-x^2-y^2', bot:'0', r:2},
    {label:'hemisphere',     top:'sqrt(4-x^2-y^2)', bot:'0', r:2},
    {label:'between planes', top:'2', bot:'x^2+y^2', r:1.4},
  ],
  area: [
    {label:'x² [0,3]',     expr:'x^2', a:0, b:3},
    {label:'sin(x) [0,π]', expr:'sin(x)', a:0, b:3.14},
    {label:'e^x [-1,2]',   expr:'exp(x)', a:-1, b:2},
    {label:'wave 🎬',      expr:'sin(x + t)', a:0, b:6.28},
  ],
  contour: [
    {label:'saddle',  expr:'x^2-y^2', r:4},
    {label:'volcano', expr:'-exp(-(x^2+y^2)/2)', r:3},
    {label:'ripple',  expr:'sin(sqrt(x^2+y^2))', r:7},
  ]
};

function updatePresets(tab) {
  const container = document.getElementById('presets');
  container.innerHTML = '';
  (PRESETS[tab] || []).forEach(p => {
    const btn = document.createElement('button');
    btn.className = 'preset-btn';
    btn.textContent = p.label;
    btn.onclick = () => {
      if (tab === 'surface') {
        fnRows[0].expr = p.expr;
        document.getElementById('fn-expr-' + fnRows[0].id).value = p.expr;
        document.getElementById('range-surface').value = p.r;
      } else if (tab === 'volume') {
        document.getElementById('fn-vol-top').value = p.top;
        document.getElementById('fn-vol-bot').value = p.bot;
        document.getElementById('range-vol').value = p.r;
      } else if (tab === 'area') {
        fnRows[0].expr = p.expr;
        document.getElementById('fn-expr-' + fnRows[0].id).value = p.expr;
        document.getElementById('area-a').value = p.a;
        document.getElementById('area-b').value = p.b;
      } else if (tab === 'contour') {
        document.getElementById('fn-contour').value = p.expr;
        document.getElementById('range-contour').value = p.r;
      }
      redraw();
    };
    container.appendChild(btn);
  });
}

// ── MOBILE TOUCH ──
function initMobileTouch() {
  const plotWrap = document.querySelector('.plot-wrap');
  let lastDist = 0, lastAngle = 0;

  plotWrap.addEventListener('touchstart', e => {
    if (e.touches.length === 2) {
      const dx = e.touches[0].clientX - e.touches[1].clientX;
      const dy = e.touches[0].clientY - e.touches[1].clientY;
      lastDist = Math.hypot(dx, dy);
      lastAngle = Math.atan2(dy, dx);
    }
  }, { passive: true });

  plotWrap.addEventListener('touchmove', e => {
    if (e.touches.length === 2) {
      e.preventDefault();
      const dx = e.touches[0].clientX - e.touches[1].clientX;
      const dy = e.touches[0].clientY - e.touches[1].clientY;
      const dist = Math.hypot(dx, dy);
      const scale = dist / lastDist;
      lastDist = dist;

      // Plotly zoom via relayout
      if (Math.abs(scale - 1) > 0.02 && currentTab === 'surface') {
        const scene = document.getElementById('plot')._fullLayout?.scene;
        if (scene) {
          const cam = scene.camera.eye;
          const factor = scale > 1 ? 0.95 : 1.05;
          Plotly.relayout('plot', {
            'scene.camera.eye.x': cam.x * factor,
            'scene.camera.eye.y': cam.y * factor,
            'scene.camera.eye.z': cam.z * factor,
          });
        }
      }
    }
  }, { passive: false });
}

// ── INIT ──
buildSchemeBar();
addFnRow('sin(sqrt(x^2 + y^2))');
updatePresets('surface');
drawSurface();
initMobileTouch();
